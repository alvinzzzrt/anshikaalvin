<!DOCTYPE html>
<html>
<head>
<title>BRNZEL ACC SORTER</title>

<style>
body {
  font-family: 'Segoe UI';
  margin: 0;
  background: linear-gradient(to bottom, #f8f1e7, #e6d5c3);
  text-align: center;
  color: #4b3b2a;
}

h1 {
  margin-top: 20px;
  font-size: 40px;
}

.top-icons {
  font-size: 30px;
  margin-top: 10px;
}

.buttons {
  margin: 20px;
}

button {
  padding: 10px 18px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  background: #c8a27c;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #a67c52;
}

.card {
  background: white;
  margin: 15px auto;
  padding: 15px;
  width: 85%;
  border-radius: 15px;
}

textarea, input {
  width: 80%;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.dropdown {
  max-height: 220px;
  overflow-y: auto;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px;
  text-align: left;
}

.highlight {
  background: #ffe0b2;
}

.section { display:none; }
.active { display:block; }
</style>

</head>
<body>

<h1>🏔️ BRNZEL ACC SORTER 🌊</h1>
<div class="top-icons">🌿 🧺 📂</div>

<div class="buttons">
<button onclick="show('t1')">Info Adder</button>
<button onclick="show('t2')">Manage</button>
<button onclick="show('t3')">Extractor</button>
</div>

<!-- TOOL 1 -->
<div id="t1" class="section card">
<h3>Info Adder</h3>

<input id="pot" placeholder="Potions">
<input id="buck" placeholder="Bucks">
<input id="cur" placeholder="Currency">

<textarea id="input1"></textarea>
<input type="file" onchange="readFile(event,'input1')">

<button onclick="addInfo()">Process</button>
<button onclick="download('tool1','info.txt')">Download</button>
<button onclick="copyData('tool1')">Copy</button>

<input id="s1" placeholder="Search" oninput="search('l1','s1')">
<div id="l1" class="dropdown"></div>
</div>

<!-- TOOL 2 -->
<div id="t2" class="section card">
<h3>Manage Accounts</h3>

<textarea id="input2"></textarea>
<input type="file" onchange="readFile(event,'input2')">

<button onclick="saveAcc('valid')">Valid</button>
<button onclick="saveAcc('invalid')">Invalid</button>
<button onclick="download('tool2','am.txt')">Download</button>
<button onclick="copyData('tool2')">Copy</button>

<input id="s2" oninput="search('l2','s2')">
<div id="l2" class="dropdown"></div>
</div>

<!-- TOOL 3 -->
<div id="t3" class="section card">
<h3>Extractor</h3>

<textarea id="input3"></textarea>
<input type="file" onchange="readFile(event,'input3')">

<button onclick="extract()">Extract</button>
<button onclick="download('tool3','userpass.txt')">Download</button>
<button onclick="copyData('tool3')">Copy</button>

<input id="s3" oninput="search('l3','s3')">
<div id="l3" class="dropdown"></div>
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function readFile(e,id){
  let r=new FileReader();
  r.onload=x=>document.getElementById(id).value=x.target.result;
  r.readAsText(e.target.files[0]);
}

function getUP(line){
  let m=line.match(/([^\s:\/]+)[\:\/]([^\s:]+)/);
  return m?m:null;
}

// TOOL1
function addInfo(){
  let p=pot.value,b=buck.value,c=cur.value;
  let lines=input1.value.split("\n");
  let out=[];

  lines.forEach(l=>{
    let m=getUP(l);
    if(m){
      out.push(`user: ${m[1]} | pass: ${m[2]} | potions: ${p} | bucks: ${b} | currency: ${c}`);
    }
  });

  localStorage.setItem("tool1",JSON.stringify(out));
  render("l1",out);
}

// TOOL2
function saveAcc(type){
  let lines=input2.value.split("\n");
  let data=JSON.parse(localStorage.getItem("tool2"))||[];

  lines.forEach(l=>{
    let m=getUP(l);
    if(m){
      data.push(`user: ${m[1]} | pass: ${m[2]} | status: ${type}`);
    }
  });

  localStorage.setItem("tool2",JSON.stringify(data));
  render("l2",data);
}

// TOOL3
function extract(){
  let lines=input3.value.split("\n");
  let out=[];

  lines.forEach(l=>{
    let m=getUP(l);
    if(m){
      out.push(`user: ${m[1]} | pass: ${m[2]}`);
    }
  });

  out=[...new Set(out)];
  localStorage.setItem("tool3",JSON.stringify(out));
  render("l3",out);
}

function render(id,data){
  let d=document.getElementById(id);
  d.innerHTML="";
  data.forEach(x=>{
    let div=document.createElement("div");
    div.textContent=x;
    d.appendChild(div);
  });
}

function search(list,s){
  let val=document.getElementById(s).value.toLowerCase();
  let items=document.getElementById(list).children;

  for(let i=0;i<items.length;i++){
    items[i].classList.remove("highlight");
    if(val && items[i].textContent.toLowerCase().includes(val)){
      items[i].classList.add("highlight");
      items[i].scrollIntoView({behavior:"smooth",block:"center"});
    }
  }
}

function download(key,name){
  let d=JSON.parse(localStorage.getItem(key))||[];
  let blob=new Blob([d.join("\n")]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

function copyData(key){
  let d=JSON.parse(localStorage.getItem(key))||[];
  navigator.clipboard.writeText(d.join("\n"));
}

window.onload=()=>{
  render("l1",JSON.parse(localStorage.getItem("tool1"))||[]);
  render("l2",JSON.parse(localStorage.getItem("tool2"))||[]);
  render("l3",JSON.parse(localStorage.getItem("tool3"))||[]);
}
</script>

</body>
</html>
